name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Pages project name from wrangler.toml
        id: project
        run: |
          project_name=$(awk -F'"' '/^name[[:space:]]*=/ { print $2; exit }' wrangler.toml)
          if [ -z "$project_name" ]; then
            echo "Could not read Pages project name from wrangler.toml" >&2
            exit 1
          fi
          echo "name=$project_name" >> "$GITHUB_OUTPUT"

      - name: Determine deploy environment
        id: deploy_env
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "env=preview" >> "$GITHUB_OUTPUT"
            project_name="${{ steps.project.outputs.name }}"
            echo "project_name=$project_name" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "env=dev" >> "$GITHUB_OUTPUT"
            project_name="${{ steps.project.outputs.name }}-dev"
            echo "project_name=$project_name" >> "$GITHUB_OUTPUT"
          else
            echo "env=prod" >> "$GITHUB_OUTPUT"
            project_name="${{ steps.project.outputs.name }}"
            echo "project_name=$project_name" >> "$GITHUB_OUTPUT"
          fi
          echo "sitemap_base_url=https://${project_name}.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          SITEMAP_BASE_URL: ${{ steps.deploy_env.outputs.sitemap_base_url }}
        run: npm run build

      - name: Check if Pages project exists
        id: check_pages_project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ steps.deploy_env.outputs.project_name }}
        run: |
          status_code=$(curl -sS -o /tmp/cf-pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PROJECT_NAME}")

          if [ "$status_code" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif [ "$status_code" = "404" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected API response (${status_code})."
            cat /tmp/cf-pages-project.json
            exit 1
          fi

      - name: Create Pages project
        if: steps.check_pages_project.outputs.exists == 'false'
        run: |
          echo "::error::Missing Terraform-managed Pages project: ${{ steps.deploy_env.outputs.project_name }}"
          echo "::error::Run/apply cloudflare-infra Terraform first."
          exit 1

      - name: Determine deploy branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy with Wrangler
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.80.0"
          command: pages deploy dist --project-name ${{ steps.deploy_env.outputs.project_name }} --branch ${{ steps.branch.outputs.name }} --commit-dirty=true

      - name: Post preview URL to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const url = process.env.DEPLOYMENT_URL || 'unavailable';
            const body = `### Preview Deployment\n\nDeployed to: ${url}\n\n*Branch: \`${{ steps.branch.outputs.name }}\`*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Post-deploy smoke test
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          PAGES_PROJECT_NAME: ${{ steps.deploy_env.outputs.project_name }}
        run: |
          sleep 5
          default_url="https://${PAGES_PROJECT_NAME}.pages.dev/"
          url="${DEPLOYMENT_URL:-$default_url}"
          status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo "000")
          echo "$url -> HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
            echo "::error::Smoke test failed for $url (HTTP $status)"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Trigger router redeploy
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            deploy_env=dev
          else
            deploy_env=prod
          fi
          gh api repos/AnasImloul/cloudflare-infra/dispatches \
            -f event_type=app-deployed \
            -f "client_payload[app]=${{ github.repository }}" \
            -f "client_payload[environment]=$deploy_env"
