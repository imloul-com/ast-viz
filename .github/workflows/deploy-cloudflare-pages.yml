name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Pages project name from wrangler.toml
        id: project
        run: |
          project_name=$(awk -F'"' '/^name[[:space:]]*=/ { print $2; exit }' wrangler.toml)
          if [ -z "$project_name" ]; then
            echo "Could not read Pages project name from wrangler.toml" >&2
            exit 1
          fi
          echo "name=$project_name" >> "$GITHUB_OUTPUT"

      - name: Validate route-config matches wrangler.toml
        run: |
          wrangler_name=$(awk -F'"' '/^name[[:space:]]*=/ { print $2; exit }' wrangler.toml)
          config_name=$(jq -r '.projectName' route-config.json)
          if [ "$wrangler_name" != "$config_name" ]; then
            echo "MISMATCH: wrangler.toml name='$wrangler_name' vs route-config.json projectName='$config_name'" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if Pages project exists
        id: check_pages_project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ steps.project.outputs.name }}
        run: |
          status_code=$(curl -sS -o /tmp/cf-pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PROJECT_NAME}")

          if [ "$status_code" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif [ "$status_code" = "404" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected API response (${status_code})."
            cat /tmp/cf-pages-project.json
            exit 1
          fi

      - name: Create Pages project
        if: steps.check_pages_project.outputs.exists == 'false'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.80.0"
          command: pages project create ${{ steps.project.outputs.name }} --production-branch main

      - name: Determine deploy branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy with Wrangler
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.80.0"
          command: pages deploy dist --project-name ${{ steps.project.outputs.name }} --branch ${{ steps.branch.outputs.name }} --commit-dirty=true

      - name: Post preview URL to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const url = process.env.DEPLOYMENT_URL || 'unavailable';
            const body = `### Preview Deployment\n\nDeployed to: ${url}\n\n*Branch: \`${{ steps.branch.outputs.name }}\`*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Trigger router redeploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          gh api repos/AnasImloul/cloudflare-infra/dispatches \
            -f event_type=app-deployed \
            -f "client_payload[app]=${{ github.repository }}"
