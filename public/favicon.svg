<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <style>
        .bg     { fill: #0d0d0f; }
        .edge   { stroke: #e8613a; stroke-width: 1.8; stroke-linecap: round; }
        .node   { fill: #e8613a; }
        .node-hollow { fill: #0d0d0f; stroke: #e8613a; stroke-width: 1.8; }
        @media (prefers-color-scheme: light) {
        .bg           { fill: #f7f5f0; }
        .edge         { stroke: #c9501f; }
        .node         { fill: #c9501f; }
        .node-hollow  { fill: #f7f5f0; stroke: #c9501f; }
        }
    </style>
    <rect class="bg" width="32" height="32" rx="7"/>
    <!-- edges -->
    <line class="edge" x1="16" y1="10" x2="9"  y2="21"/>
    <line class="edge" x1="16" y1="10" x2="23" y2="21"/>
    <!-- leaf nodes (hollow) -->
    <circle class="node-hollow" cx="9"  cy="22" r="3.2"/>
    <circle class="node-hollow" cx="23" cy="22" r="3.2"/>
    <!-- root node (filled) -->
    <circle class="node" cx="16" cy="9" r="3.5"/>
</svg>
